name: Publish NuGet

on:
  push:
    tags:
      - 'KoreForge.Templates/v*'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Pack & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Pack
        run: |
          TAG_NAME="${GITHUB_REF_NAME#KoreForge.Templates/}"
          VERSION="${TAG_NAME#v}"
          dotnet pack KoreForge.Templates.csproj -c Release -p:PackageVersion=$VERSION -o artifacts/

      - name: Push to NuGet.org
        run: |
          dotnet nuget push artifacts/*.nupkg \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.nupkg
          generate_release_notes: true
